<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
        }

        .login-container {
            width: 440px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 35px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            color: #ffffff;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .login-header h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-group label .required {
            color: #ff6b6b;
            margin-left: 2px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 13px 14px 13px 44px;
            background: rgba(255, 255, 255, 0.08);
            border: 1.5px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 14px 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #ffffff;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .otp-info {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }

        .resend-link {
            text-align: center;
            margin-top: 15px;
        }

        .resend-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .resend-link a:hover {
            color: #a78bfa;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 13px;
            margin-top: 14px;
            transition: color 0.3s ease;
        }

        .back-home:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        @media (max-width: 480px) {
            .login-container {
                width: 100%;
                padding: 30px 20px 24px;
            }

            .login-header .icon {
                width: 64px;
                height: 64px;
                font-size: 28px;
            }

            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="icon">📱</div>
            <h1>OTP Verification</h1>
            <p>Enter the OTP sent to your registered email</p>
        </div>

        <form id="otpForm" onsubmit="handleOTP(event)">
            <div class="otp-info">
                ℹ️ A One-Time Password has been sent to your registered email address. Please enter it below.
            </div>

            <div class="form-group">
                <label>Enter OTP <span class="required">*</span></label>
                <div class="input-wrapper">
                    <span class="input-icon">🔐</span>
                    <input type="text" id="otp" placeholder="Enter 6-digit OTP" required maxlength="6" pattern="[0-9]{6}">
                </div>
            </div>

            <button type="submit" class="btn-submit">VERIFY OTP</button>

            <div class="resend-link">
                Didn't receive OTP? <a href="#" onclick="resendOTP(event)">RESEND OTP</a>
            </div>
        </form>

        <div class="login-footer">
            <a href="for8.html" class="back-home">← Back to Login</a>
        </div>
    </div>

    <script>
        function handleOTP(e) {
            e.preventDefault();

            const otp = document.getElementById('otp').value.trim();

            if (!otp || otp.length !== 6 || isNaN(otp)) {
                alert('Please enter a valid 6-digit OTP');
                return false;
            }

            alert('OTP verified successfully!');
            window.location.href = 'dashboard.html';
        }

        function resendOTP(e) {
            e.preventDefault();
            alert('OTP has been resent to your registered email');
        }
    </script>
</body>
</html>
