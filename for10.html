<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission Confirmation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .confirmation-container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 50px;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .confirmation-container h1 {
            color: #10b981;
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .confirmation-container p {
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .confirmation-details {
            background: #f5f7fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: left;
        }

        .detail-item {
            margin-bottom: 12px;
            font-size: 14px;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            margin-top: 4px;
        }

        .confirmation-id {
            background: #e5f7ff;
            border: 1px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .confirmation-id label {
            display: block;
            color: #666;
            font-weight: 600;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .confirmation-id .id {
            color: #667eea;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        @media (max-width: 480px) {
            .confirmation-container {
                padding: 25px;
            }

            .action-buttons {
                grid-template-columns: 1fr;
            }

            .confirmation-container h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <div class="success-icon">✅</div>
        
        <h1>Project Submitted Successfully!</h1>
        
        <p>Your project has been submitted to the Government Project Management System. Our team will review it shortly.</p>

        <div class="confirmation-id">
            <label>Submission Reference ID</label>
            <div class="id" id="refId">PRJ-2024-001</div>
        </div>

        <div class="confirmation-details">
            <div class="detail-item">
                <div class="detail-label">Submitted On:</div>
                <div class="detail-value" id="submittedDate">Loading...</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Status:</div>
                <div class="detail-value" style="color: #10b981; font-weight: 600;">✓ Pending Review</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Next Step:</div>
                <div class="detail-value">You will receive an email confirmation within 24 hours</div>
            </div>
        </div>

        <div class="action-buttons">
            <a href="for6.html" class="btn btn-primary">New Submission</a>
            <a href="index.html" class="btn btn-secondary">Go Home</a>
        </div>
    </div>

    <script>
        // Generate Reference ID
        const refId = 'PRJ-' + new Date().getFullYear() + '-' + Math.floor(Math.random() * 100000).toString().padStart(6, '0');
        document.getElementById('refId').textContent = refId;

        // Display current date
        const now = new Date();
        document.getElementById('submittedDate').textContent = now.toLocaleString('en-IN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    </script>
</body>
</html>
